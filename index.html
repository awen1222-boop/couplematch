<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>開獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased text-gray-800">

    <div class="max-w-md mx-auto px-4 py-8">
        <header class="text-center mb-6">
            <h1 id="app-title" class="text-3xl font-extrabold text-indigo-600 cursor-pointer select-none">課後作業</h1>
            <p class="text-sm text-gray-500 mt-2">絕對隱私 · 即時配對系統</p>
        </header>

        <main id="main-card" class="bg-white rounded-2xl shadow-xl p-6 min-h-[400px] flex flex-col justify-between mb-4">
            
            <div id="step-identity" class="space-y-4">
                <h2 class="text-lg font-bold text-center border-b pb-2">Step 1: 請輸入你的姓名</h2>
                
                <div class="flex justify-center items-center space-x-2 bg-indigo-50 p-2 rounded-lg mb-2">
                    <label for="pair-count" class="text-sm font-bold text-indigo-800">人數設定：</label>
                    <select id="pair-count" class="border border-indigo-200 rounded px-2 py-1 text-sm bg-white text-indigo-700 outline-none shadow-sm focus:border-indigo-500">
                        <option value="2">2 對 (4人)</option>
                        <option value="3">3 對 (6人)</option>
                        <option value="4">4 對 (8人)</option>
                        <option value="5">5 對 (10人)</option>
                        <option value="6">6 對 (12人)</option>
                        <option value="7">7 對 (14人)</option>
                        <option value="8" selected>8 對 (16人)</option>
                    </select>
                </div>

                <p class="text-xs text-amber-600 bg-amber-50 p-2 rounded text-center">💡 輸入完畢請按右側確認鍵，鎖定後欄位將自動反灰</p>
                
                <div id="identity-grid" class="flex flex-col max-h-[380px] overflow-y-auto p-1 space-y-3">
                    <div class="text-center text-gray-400 text-sm py-4">🔄 正在連線讀取名單...</div>
                </div>

                <button id="btn-proceed-pairing" class="w-full bg-gray-300 text-gray-500 font-bold py-3 rounded-xl transition mt-2 text-lg cursor-not-allowed" disabled>
                    配對
                </button>
            </div>

            <div id="step-vote" class="space-y-4 hidden">
                <div class="text-center">
                    <span id="user-badge" class="inline-block bg-indigo-100 text-indigo-800 text-xs font-semibold px-3 py-1 rounded-full"></span>
                    <h2 class="text-lg font-bold mt-2 text-center">Step 2: 心儀對象心動互選</h2>
                    
                    <div class="text-left text-xs bg-indigo-50 p-3 rounded-xl space-y-1 my-3 text-gray-600 border border-indigo-100">
                        <p class="font-bold text-indigo-800 mb-1">📊 評分標準說明：</p>
                        <p>❤️❤️ <strong>❤️❤️</strong> ：印象很好❤️</p>
                        <p>⭕ <strong>O</strong> ：感覺不錯，還需要相處看看</p>
                        <p>❌ <strong>X</strong> ：抱歉，沒有眼緣</p>
                    </div>
                </div>

                <div id="vote-list" class="space-y-3 max-h-[320px] overflow-y-auto p-1">
                    </div>

                <div class="grid grid-cols-3 gap-2 mt-2">
                    <button id="btn-back-to-step1" class="col-span-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl transition shadow-sm border border-gray-300">
                        ⬅ 返回
                    </button>
                    <button id="btn-submit-vote" class="col-span-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-lg">
                        🔒 送出投票
                    </button>
                </div>
            </div>

            <div id="step-waiting" class="text-center space-y-4 py-12 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
                <h2 class="text-xl font-bold text-gray-700">投票已安全加密送出！</h2>
                <p class="text-sm text-gray-500">請等待所有人投完票，系統將自動揭曉結果...</p>
            </div>

            <div id="step-result" class="space-y-6 text-center py-6 hidden">
                <div id="result-status-icon" class="text-6xl"></div>
                <h2 id="result-title" class="text-2xl font-black"></h2>
                
                <div id="match-container" class="bg-indigo-50/60 rounded-xl p-4 space-y-2 hidden">
                    <p class="text-sm font-bold text-indigo-800 border-b pb-1">❤ 恭喜！配對成功結果如下 ❤</p>
                    <div id="match-list" class="space-y-3 pt-1">
                        </div>
                </div>
                <p id="result-desc" class="text-sm text-gray-600 px-4 whitespace-pre-line"></p>
            </div>

        </main>

        <div id="public-reset-container" class="flex flex-col space-y-2">
            <button id="btn-force-reload" class="w-full bg-amber-100 hover:bg-amber-200 text-amber-700 font-bold py-2.5 px-4 rounded-xl text-sm transition shadow-sm border border-amber-300">
                🚀 強制更新網頁 / 清除本機紀錄
            </button>
            <button id="btn-public-reset" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold py-2.5 px-4 rounded-xl text-sm transition shadow-sm border border-gray-300">
                🔄 全域重設系統 (刪除所有紀錄)
            </button>
        </div>

        <section id="admin-panel" class="mt-6 bg-gray-800 text-white rounded-xl p-4 space-y-4 hidden">
            <h3 class="text-md font-bold text-amber-400 border-b border-gray-700 pb-1">👑 主辦人隱密主控台</h3>
            <div class="text-xs space-y-1 text-gray-300">
                <p>📊 目前連線人數：<span id="admin-count-join" class="text-white font-bold">0</span> / <span id="admin-total-join">16</span></p>
                <p>📝 已完成投票數：<span id="admin-count-vote" class="text-white font-bold">0</span> / <span id="admin-total-vote">16</span></p>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button id="btn-admin-calc" class="bg-emerald-600 hover:bg-emerald-700 font-bold py-2 px-3 rounded text-sm transition">
                    🚀 強制提早結算
                </button>
                <button id="btn-admin-reset" class="bg-rose-600 hover:bg-rose-700 font-bold py-2 px-3 rounded text-sm transition">
                    🔄 全域重設
                </button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 防護金鑰拼接
        const firebaseConfig = {
            apiKey: "AIzaSy" + "AicnJwTpTewbmyxQBcCb-Cu-0Hcupry88",
            authDomain: "my-couple-game-8cfcd.firebaseapp.com",
            databaseURL: "https://my-couple-game-8cfcd-default-rtdb.firebaseio.com",
            projectId: "my-couple-game-8cfcd",
            storageBucket: "my-couple-game-8cfcd.firebasestorage.app",
            messagingSenderId: "1088332175776",
            appId: "1:1088332175776:web:746a7dd2dce7bc5efa6cc5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const PAIR_LABELS = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'];
        let ROLES = []; 

        let myId = null;
        let myRoleObj = null;
        try {
            myId = localStorage.getItem('game_myId');
            myRoleObj = JSON.parse(localStorage.getItem('game_myRole') || 'null');
        } catch (e) {
            console.warn('本地資料解析失敗，已自動清除舊暫存');
            localStorage.removeItem('game_myId');
            localStorage.removeItem('game_myRole');
        }

        let myVotes = {};
        let clickTitleCount = 0;
        let isReadyToVote = false; 

        const stepIdentity = document.getElementById('step-identity');
        const stepVote = document.getElementById('step-vote');
        const stepWaiting = document.getElementById('step-waiting');
        const stepResult = document.getElementById('step-result');
        const adminPanel = document.getElementById('admin-panel');

        function switchStep(stepElement) {
            [stepIdentity, stepVote, stepWaiting, stepResult].forEach(el => el.classList.add('hidden'));
            stepElement.classList.remove('hidden');
        }

        // 秘技：點擊標題5次開啟後台
        document.getElementById('app-title').addEventListener('click', () => {
            clickTitleCount++;
            if (clickTitleCount >= 5) {
                adminPanel.classList.toggle('hidden');
                clickTitleCount = 0;
            }
        });

        // ==========================
        // 核心運算：情侶對情侶自動配對邏輯
        // ==========================
        async function calculateResults() {
            try {
                const snapshot = await get(ref(db, '/'));
                const data = snapshot.val() || {};
                const votes = data.votes || {};
                const users = data.users || {};
                const pairCount = parseInt(data.pairCount) || 8;
                let matches = {};
                
                Object.keys(users).forEach(u => matches[u] = []);

                const activePairs = [];
                PAIR_LABELS.forEach(label => {
                    const mId = `${label}-M`;
                    const fId = `${label}-F`;
                    if (users[mId] && users[fId]) {
                        activePairs.push(label);
                    }
                });

                if (pairCount === 2) {
                    // 只選擇 2 對的情況
                    const p1 = activePairs[0];
                    const p2 = activePairs[1];
                    if (p1 && p2) {
                        const m1 = `${p1}-M`, f1 = `${p1}-F`;
                        const m2 = `${p2}-M`, f2 = `${p2}-F`;
                        const n_m1 = users[m1].name, n_f1 = users[f1].name;
                        const n_m2 = users[m2].name, n_f2 = users[f2].name;

                        // 抓出這兩對四個人彼此投的票
                        const v1 = votes[m1]?.[f2] || 'X';
                        const v2 = votes[f1]?.[m2] || 'X';
                        const v3 = votes[m2]?.[f1] || 'X';
                        const v4 = votes[f2]?.[m1] || 'X';

                        const scores = [v1, v2, v3, v4];

                        if (scores.includes('X')) {
                            // 只要有一人投 X，就是配對失敗
                            const failInfo = { oppCouple: '', title: '【🍃 抱歉~這次沒對上頻率】', text: '沒關係，相遇即是緣分，期待下次的火花！', style: 'fail' };
                            matches[m1].push(failInfo); matches[f1].push(failInfo);
                            matches[m2].push(failInfo); matches[f2].push(failInfo);
                        } else {
                            let titleStr = "", textStr = "", styleType = "";
                            if (scores.every(s => s === '❤️❤️')) {
                                // 四人都是愛心
                                titleStr = "【❤️ 天選之人！雙向奔赴】"; textStr = "四人都是愛心，天選之人 還不約起來!!"; styleType = "heaven";
                            } else {
                                // 沒有 X，包含愛心或 O
                                titleStr = "【☕ 印象不錯，可以再約！】"; textStr = "大家覺得印象不錯，可以再約出來多認識喔！"; styleType = "nice";
                            }
                            
                            const name1 = `${n_m1} & ${n_f1}`;
                            const name2 = `${n_m2} & ${n_f2}`;

                            const infoFor1 = { oppCouple: name2, title: titleStr, text: textStr, style: styleType };
                            const infoFor2 = { oppCouple: name1, title: titleStr, text: textStr, style: styleType };
                            
                            matches[m1].push(infoFor1); matches[f1].push(infoFor1);
                            matches[m2].push(infoFor2); matches[f2].push(infoFor2);
                        }
                    }
                } else {
                    // 選擇 3~8 對的情境
                    for (let i = 0; i < activePairs.length; i++) {
                        for (let j = i + 1; j < activePairs.length; j++) {
                            const p1 = activePairs[i];
                            const p2 = activePairs[j];

                            const m1 = `${p1}-M`, f1 = `${p1}-F`;
                            const m2 = `${p2}-M`, f2 = `${p2}-F`;
                            
                            if (!users[m1] || !users[f1] || !users[m2] || !users[f2]) continue;

                            const n_m1 = users[m1].name, n_f1 = users[f1].name;
                            const n_m2 = users[m2].name, n_f2 = users[f2].name;

                            const v1 = votes[m1]?.[f2] || 'X';
                            const v2 = votes[f1]?.[m2] || 'X';
                            const v3 = votes[m2]?.[f1] || 'X';
                            const v4 = votes[f2]?.[m1] || 'X';

                            const scores = [v1, v2, v3, v4];

                            if (scores.includes('X')) {
                                continue; // 只要有失敗，就不顯示在結果卡片內
                            }

                            let titleStr = "", textStr = "", styleType = "";
                            if (scores.every(s => s === '❤️❤️')) {
                                titleStr = "【❤️ 天選之人！雙向奔赴】"; textStr = "四人都是愛心，天選之人 還不約起來!!"; styleType = "heaven";
                            } else {
                                titleStr = "【☕ 印象不錯，可以再約！】"; textStr = "大家覺得印象不錯，可以再約出來多認識喔！"; styleType = "nice";
                            }
                            
                            const name1 = `${n_m1} & ${n_f1}`;
                            const name2 = `${n_m2} & ${n_f2}`;

                            const infoFor1 = { oppCouple: name2, title: titleStr, text: textStr, style: styleType };
                            const infoFor2 = { oppCouple: name1, title: titleStr, text: textStr, style: styleType };
                            
                            matches[m1].push(infoFor1); matches[f1].push(infoFor1);
                            matches[m2].push(infoFor2); matches[f2].push(infoFor2);
                        }
                    }
                }

                await update(ref(db, '/'), {
                    state: 'finished',
                    matches: matches
                });

                if (window.isAdminTrigger) {
                    alert('強制結算完成！全場已跳轉至結果畫面。');
                    window.isAdminTrigger = false;
                }
            } catch (error) {
                console.error("結算失敗:", error);
                if (window.isAdminTrigger) alert("結算失敗，請檢查網路狀態。");
            }
        }

        // ==========================
        // 監聽 Firebase 資料
        // ==========================
        onValue(ref(db, '/'), (snapshot) => {
            try {
                const data = snapshot.val() || {};
                const onlineUsers = data.users || {};
                const votes = data.votes || {};
                const systemState = data.state || 'voting';
                const finalMatches = data.matches || {};
                
                const pairCount = parseInt(data.pairCount) || 8; 

                const pairCountSelect = document.getElementById('pair-count');
                if (pairCountSelect.value !== pairCount.toString()) {
                    pairCountSelect.value = pairCount;
                }

                if (myId && !onlineUsers[myId]) {
                    myId = null;
                    myRoleObj = null;
                    localStorage.removeItem('game_myId');
                    localStorage.removeItem('game_myRole');
                    myVotes = {};
                    isReadyToVote = false;
                }

                ROLES = Object.values(onlineUsers);

                const totalPeople = pairCount * 2;
                const currentVoteCount = Object.keys(votes).length;
                
                document.getElementById('admin-count-join').innerText = Object.keys(onlineUsers).length;
                document.getElementById('admin-total-join').innerText = totalPeople;
                document.getElementById('admin-count-vote').innerText = currentVoteCount;
                document.getElementById('admin-total-vote').innerText = totalPeople;

                // 🌟 自動開獎機制：當所有人投完票時，第一個觸發的人自動進行結算
                if (systemState === 'voting' && currentVoteCount >= totalPeople && totalPeople > 0) {
                    const firstUserId = Object.keys(onlineUsers)[0];
                    if (myId === firstUserId) {
                        calculateResults();
                    }
                    return; // 暫停渲染，等待結算完畢後切換到 finished
                }

                if (systemState === 'finished') {
                    if (myId) {
                        showMyResult(finalMatches[myId] || []);
                    } else {
                        document.getElementById('result-title').innerText = "開獎計算完成";
                        document.getElementById('result-status-icon').innerText = "🏁";
                        document.getElementById('result-desc').innerText = "結果已完成交叉配對。";
                        switchStep(stepResult);
                    }
                } else {
                    if (!isReadyToVote) {
                        renderIdentityGrid(onlineUsers, pairCount);
                        switchStep(stepIdentity);
                    } else if (votes[myId]) {
                        switchStep(stepWaiting);
                    } else {
                        renderVoteList();
                        switchStep(stepVote);
                    }
                }
            } catch (err) {
                console.error("處理資料時發生錯誤: ", err);
            }
        }, (error) => {
            document.getElementById('identity-grid').innerHTML = `<div class="text-center text-red-500 font-bold py-4">資料庫連線失敗，請檢查網路或系統權限。<br>(${error.message})</div>`;
        });

        document.getElementById('pair-count').addEventListener('change', async (e) => {
            await update(ref(db, '/'), { pairCount: parseInt(e.target.value) });
        });

        document.getElementById('btn-proceed-pairing').onclick = () => {
            isReadyToVote = true;
            renderVoteList();
            switchStep(stepVote);
        };

        function renderIdentityGrid(onlineUsers, pairCount) {
            const grid = document.getElementById('identity-grid');
            grid.innerHTML = '';
            
            const header = document.createElement('div');
            header.className = "flex font-bold text-gray-600 mb-1 text-center text-sm items-center pb-2 border-b border-gray-200";
            header.innerHTML = `
                <div class="w-8"></div>
                <div class="flex-1 text-blue-600">👦 男生</div>
                <div class="flex-1 text-pink-600">👧 女生</div>
            `;
            grid.appendChild(header);

            let filledCount = 0;

            for (let i = 0; i < pairCount; i++) {
                const pairId = PAIR_LABELS[i];
                const row = document.createElement('div');
                row.className = "flex items-center space-x-2 bg-white p-2 rounded-xl shadow-sm border border-gray-100";
                
                const label = document.createElement('div');
                label.className = "w-8 text-center font-extrabold text-xl text-indigo-800";
                label.innerText = pairId;
                row.appendChild(label);

                row.appendChild(createSlot(pairId, 'M', onlineUsers[`${pairId}-M`]));
                row.appendChild(createSlot(pairId, 'F', onlineUsers[`${pairId}-F`]));
                
                grid.appendChild(row);

                if (onlineUsers[`${pairId}-M`]) filledCount++;
                if (onlineUsers[`${pairId}-F`]) filledCount++;
            }

            const totalSlots = pairCount * 2;
            const pairBtn = document.getElementById('btn-proceed-pairing');
            
            if (filledCount === totalSlots && myId) {
                pairBtn.disabled = false;
                pairBtn.className = "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg mt-4 text-lg animate-pulse";
            } else {
                pairBtn.disabled = true;
                pairBtn.className = "w-full bg-gray-300 text-gray-500 font-bold py-3 rounded-xl transition mt-4 text-lg cursor-not-allowed";
            }
        }

        function createSlot(pairId, gender, userData) {
            const slotId = `${pairId}-${gender}`;
            const container = document.createElement('div');
            container.className = "flex-1 flex space-x-1";

            const input = document.createElement('input');
            input.type = "text";
            input.id = `input-${slotId}`;
            input.className = "w-full border-2 border-gray-200 rounded-lg px-2 py-1.5 text-sm outline-none focus:border-indigo-500 bg-gray-50 placeholder-gray-400 font-bold text-gray-700";
            input.placeholder = "輸入名字";

            const btn = document.createElement('button');
            btn.innerHTML = "✔"; 
            btn.className = "bg-white border-2 border-green-500 text-green-500 hover:bg-green-500 hover:text-white px-2 rounded-lg font-bold transition flex items-center justify-center";
            
            if (userData) {
                input.value = userData.name;
                input.disabled = true;
                input.className = "w-full border-2 border-transparent rounded-lg px-2 py-1.5 text-sm bg-gray-200 text-gray-500 cursor-not-allowed font-bold";
                btn.disabled = true;
                btn.className = "bg-gray-300 text-white px-2 rounded-lg font-bold cursor-not-allowed";
                
                if (myId === slotId) {
                    input.classList.add('bg-indigo-100', 'text-indigo-800');
                }
            } else {
                if (myId) {
                    input.disabled = true;
                    btn.disabled = true;
                    btn.className = "bg-gray-200 text-white px-2 rounded-lg font-bold cursor-not-allowed border-none";
                } else {
                    btn.onclick = () => claimSlot(slotId, pairId, gender, input);
                }
            }

            container.appendChild(input);
            container.appendChild(btn);
            return container;
        }

        async function claimSlot(slotId, pairId, gender, inputEl) {
            const name = inputEl.value.trim();
            if (!name) {
                alert('請先在框內輸入姓名再按確認！');
                return;
            }
            myId = slotId;
            myRoleObj = { id: slotId, pairId: pairId, gender: gender, name: name };
            
            localStorage.setItem('game_myId', myId);
            localStorage.setItem('game_myRole', JSON.stringify(myRoleObj));

            document.getElementById('user-badge').innerText = `目前身分：${name} (${pairId}${gender === 'M' ? '男' : '女'})`;
            await update(ref(db, `users/${slotId}`), { joined: true, name: name, pairId: pairId, gender: gender, id: slotId });
        }

        document.getElementById('btn-back-to-step1').onclick = async () => {
            if (!myId) return;
            const tempId = myId;
            myId = null; 
            myRoleObj = null;
            localStorage.removeItem('game_myId');
            localStorage.removeItem('game_myRole');
            myVotes = {};
            isReadyToVote = false;
            await set(ref(db, `users/${tempId}`), null);
            await set(ref(db, `votes/${tempId}`), null);
        };

        function renderVoteList() {
            const list = document.getElementById('vote-list');
            list.innerHTML = '';
            const targetGender = myRoleObj.gender === 'M' ? 'F' : 'M';
            
            const targets = ROLES.filter(r => r.gender === targetGender && r.pairId !== myRoleObj.pairId);

            targets.forEach(target => {
                myVotes[target.id] = myVotes[target.id] || 'X'; 

                const row = document.createElement('div');
                row.className = 'flex items-center justify-between p-3 bg-white border border-gray-200 rounded-xl shadow-sm';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = 'font-bold text-gray-700';
                nameSpan.innerText = `${target.name} (${target.pairId}${target.gender === 'M' ? '男' : '女'})`;
                
                const btnGroup = document.createElement('div');
                btnGroup.className = 'flex space-x-1';

                const options = [
                    { val: '❤️❤️', label: '❤️❤️' },
                    { val: 'O', label: '⭕' },
                    { val: 'X', label: '❌' }
                ];

                options.forEach(opt => {
                    const btn = document.createElement('button');
                    const isActive = myVotes[target.id] === opt.val;
                    btn.className = `px-3 py-1 rounded text-sm transition ${isActive ? 'bg-indigo-600 text-white font-bold' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
                    btn.innerText = opt.label;
                    btn.onclick = () => {
                        myVotes[target.id] = opt.val;
                        renderVoteList();
                    };
                    btnGroup.appendChild(btn);
                });

                row.appendChild(nameSpan);
                row.appendChild(btnGroup);
                list.appendChild(row);
            });
        }

        document.getElementById('btn-submit-vote').onclick = async () => {
            if(confirm('確定送出投票嗎？送出後無法修改！')) {
                await set(ref(db, `votes/${myId}`), myVotes);
            }
        };

        // 呈現最終結果
        function showMyResult(matches) {
            switchStep(stepResult);
            const container = document.getElementById('match-container');
            const list = document.getElementById('match-list');
            const title = document.getElementById('result-title');
            const icon = document.getElementById('result-status-icon');
            const desc = document.getElementById('result-desc');

            list.innerHTML = '';

            if (matches && matches.length > 0) {
                const firstMatch = matches[0];
                
                if (firstMatch.style === 'fail') {
                    icon.innerText = "🍃";
                    title.innerText = "開獎結果";
                    title.className = "text-2xl font-black text-gray-500";
                    container.classList.add('hidden');
                    desc.innerText = firstMatch.title + "\n\n" + firstMatch.text;
                } else {
                    icon.innerText = "✨";
                    title.innerText = "開獎結果揭曉";
                    title.className = "text-2xl font-black text-indigo-600";
                    container.classList.remove('hidden');
                    desc.innerText = "太棒了！上面是與你們互相達成好感共識的情侶組，快去交流認領吧！";
                    
                    matches.forEach(match => {
                        const card = document.createElement('div');
                        const isHeaven = match.style === 'heaven';
                        
                        card.className = `w-full p-4 rounded-xl border text-left space-y-1 shadow-sm ${
                            isHeaven ? 'bg-amber-50 border-amber-300' : 'bg-emerald-50 border-emerald-300'
                        }`;
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-center border-b pb-1.5 mb-1.5 ${isHeaven ? 'border-amber-200' : 'border-emerald-200'}">
                                <span class="font-black text-base ${isHeaven ? 'text-amber-900' : 'text-emerald-900'}">🤝 ${match.oppCouple}</span>
                                <span class="text-xs px-2 py-0.5 rounded-full font-bold whitespace-nowrap ml-2 ${
                                    isHeaven ? 'bg-amber-200 text-amber-900' : 'bg-emerald-200 text-emerald-900'
                                }">${isHeaven ? '✨ 雙向奔赴' : '☕ 印象不錯'}</span>
                            </div>
                            <div class="text-base font-black ${isHeaven ? 'text-amber-700' : 'text-emerald-700'}">
                                ${match.title}
                            </div>
                            <div class="text-xs text-gray-600 font-semibold mt-1">
                                ${match.text}
                            </div>
                        `;
                        list.appendChild(card);
                    });
                }
            } else {
                icon.innerText = "🍃";
                title.innerText = "期待下次的火花";
                title.className = "text-2xl font-black text-gray-600";
                container.classList.add('hidden');
                desc.innerText = "大家的頻率這次稍微飄向了不同的宇宙～🚀\n別灰心！所有投票已徹底加密銷毀，誰投什麼是永遠的祕密。🤫\n多認識新朋友就是收穫，打起精神，期待下一次的驚喜！";
            }
        }

        document.getElementById('btn-admin-calc').onclick = () => {
            window.isAdminTrigger = true;
            calculateResults();
        };

        async function resetSystem() {
            if(confirm('確定要清除所有資料並重設系統嗎？')) {
                const currentPairCount = parseInt(document.getElementById('pair-count').value) || 8;
                await set(ref(db, '/'), { state: 'voting', pairCount: currentPairCount });
                myId = null;
                myRoleObj = null;
                localStorage.removeItem('game_myId');
                localStorage.removeItem('game_myRole');
                myVotes = {};
                isReadyToVote = false;
                alert('系統已重設！');
                
                window.location.href = window.location.pathname + '?v=' + new Date().getTime();
            }
        }

        document.getElementById('btn-force-reload').onclick = () => {
            localStorage.clear();
            window.location.href = window.location.pathname + '?v=' + new Date().getTime();
        };

        document.getElementById('btn-admin-reset').onclick = resetSystem;
        document.getElementById('btn-public-reset').onclick = resetSystem;

    </script>
</body>
</html>
