<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased text-gray-800">

    <div class="max-w-md mx-auto px-4 py-8">
        <header class="text-center mb-6">
            <h1 id="app-title" class="text-3xl font-extrabold text-indigo-600 cursor-pointer select-none"> 課後作業</h1>
        </header>

        <main id="main-card" class="bg-white rounded-2xl shadow-xl p-6 min-h-[400px] flex flex-col justify-between">
            <div id="step-identity" class="space-y-4">
                <h2 class="text-lg font-bold text-center border-b pb-2">Step 1: 報到入座</h2>
                <div class="flex items-center justify-between bg-indigo-50 p-3 rounded-xl border border-indigo-100 shadow-sm">
                    <label class="text-sm font-bold text-indigo-900">👥 總對數：</label>
                    <select id="select-couple-count" class="bg-white border rounded-lg p-1.5 font-bold">
                        <option value="2">2 對</option><option value="4">4 對</option><option value="8" selected>8 對</option>
                    </select>
                </div>
                <input type="text" id="input-username" placeholder="請輸入暱稱" class="w-full border rounded-lg px-4 py-2.5 text-center font-bold">
                <div id="identity-grid" class="space-y-3"></div>
                <button id="btn-next-step" disabled class="w-full bg-gray-300 py-3 rounded-xl font-bold">等待全員入座</button>
            </div>
            
            <div id="step-vote" class="hidden">...</div>
            <div id="step-waiting" class="hidden">...</div>
            <div id="step-result" class="hidden">...</div>
        </main>
        
        <div class="mt-4 text-center">
            <button id="btn-public-reset" class="w-full bg-gray-200 py-2 rounded-xl text-sm font-bold">🔄 全域重設 (Reset)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAicnJwTpTewbmyxQBcCb-Cu-0Hcupry88",
            authDomain: "my-couple-game-8cfcd.firebaseapp.com",
            databaseURL: "https://my-couple-game-8cfcd-default-rtdb.firebaseio.com",
            projectId: "my-couple-game-8cfcd",
            storageBucket: "my-couple-game-8cfcd.firebasestorage.app",
            messagingSenderId: "1088332175776",
            appId: "1:1088332175776:web:3c5a982950235cb5fa6cc5"
        };

        const db = getDatabase(initializeApp(firebaseConfig));
        let myId = null, globalCoupleCount = 8, globalOnlineUsers = {};

        // 監聽
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || { state: 'joining', coupleCount: 8, users: {} };
            console.log("Firebase 資料更新:", data); // 按F12看這裡是否收到資料
            
            globalOnlineUsers = data.users || {};
            globalCoupleCount = parseInt(data.coupleCount) || 8;
            
            updateIdentityGrid(globalOnlineUsers, globalCoupleCount);
        });

        function updateIdentityGrid(onlineUsers, count) {
            const grid = document.getElementById('identity-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const groupDiv = document.createElement('div');
                groupDiv.className = "grid grid-cols-2 gap-2";
                
                ['M', 'F'].forEach(gender => {
                    const id = `c${i}_${gender}`;
                    const btn = document.createElement('button');
                    const name = onlineUsers[id];
                    btn.className = `py-2 rounded-lg text-sm font-bold border ${name ? 'bg-indigo-100' : 'bg-gray-100'}`;
                    btn.innerText = name ? `🙋 ${name}` : (gender === 'M' ? '男方空缺' : '女方空缺');
                    btn.onclick = () => {
                        const u = document.getElementById('input-username').value;
                        if (!u) return alert("請輸入名字");
                        set(ref(db, `users/${id}`), u);
                        myId = id;
                    };
                    groupDiv.appendChild(btn);
                });
                grid.appendChild(groupDiv);
            }
        }
        
        document.getElementById('btn-public-reset').onclick = () => {
            set(ref(db, '/'), { state: 'joining', coupleCount: 8, users: {} });
        };
    </script>
</body>
</html>
