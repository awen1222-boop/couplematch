<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>開獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans antialiased text-gray-800">

    <div class="max-w-md mx-auto px-4 py-8">
        <header class="text-center mb-6">
            <h1 id="app-title" class="text-3xl font-extrabold text-indigo-600 cursor-pointer select-none"> 課後作業</h1>
            <p class="text-sm text-gray-500 mt-2">絕對隱私 · 即時配對系統</p>
        </header>

        <main id="main-card" class="bg-white rounded-2xl shadow-xl p-6 min-h-[400px] flex flex-col justify-between">
            
            <div id="step-identity" class="space-y-4">
                <h2 class="text-lg font-bold text-center border-b pb-2">Step 1: 請選擇你的動物身分</h2>
                <p class="text-xs text-amber-600 bg-amber-50 p-2 rounded text-center">💡 被選走的動物會自動反灰，每人限選一個身分</p>
                <div id="identity-grid" class="grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto p-1">
                    </div>
            </div>

            <div id="step-vote" class="space-y-4 hidden">
                <div class="text-center">
                    <span id="user-badge" class="inline-block bg-indigo-100 text-indigo-800 text-xs font-semibold px-3 py-1 rounded-full"></span>
                    <h2 class="text-lg font-bold mt-2 text-center">Step 2: 心儀對象心動互選</h2>
                    
                    <div class="text-left text-xs bg-indigo-50 p-3 rounded-xl space-y-1 my-3 text-gray-600 border border-indigo-100">
                        <p class="font-bold text-indigo-800 mb-1">📊 評分標準說明：</p>
                        <p>⭕ <strong>O</strong> ：印象很好❤️</p>
                        <p>⚠️ <strong>△</strong> ：感覺不錯，還需要相處看看</p>
                        <p>❌ <strong>X</strong> ：抱歉，沒有眼緣</p>
                    </div>
                </div>

                <div id="vote-list" class="space-y-3 max-h-[320px] overflow-y-auto p-1">
                    </div>

                <button id="btn-submit-vote" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-lg mt-2">
                    🔒 安全送出投票 (不可修改)
                </button>
            </div>

            <div id="step-waiting" class="text-center space-y-4 py-12 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto"></div>
                <h2 class="text-xl font-bold text-gray-700">投票已安全加密送出！</h2>
                <p class="text-sm text-gray-500">請等待主辦人統計並揭曉配對結果...</p>
            </div>

            <div id="step-result" class="space-y-6 text-center py-6 hidden">
                <div id="result-status-icon" class="text-6xl"></div>
                <h2 id="result-title" class="text-2xl font-black"></h2>
                
                <div id="match-container" class="bg-indigo-50/60 rounded-xl p-4 space-y-2 hidden">
                    <p class="text-sm font-bold text-indigo-800 border-b pb-1">❤ 恭喜！配對成功結果如下 ❤</p>
                    <div id="match-list" class="space-y-3 pt-1">
                        </div>
                </div>
                <p id="result-desc" class="text-sm text-gray-600 px-4 whitespace-pre-line"></p>
            </div>

        </main>

        <section id="admin-panel" class="mt-6 bg-gray-800 text-white rounded-xl p-4 space-y-4 hidden">
            <h3 class="text-md font-bold text-amber-400 border-b border-gray-700 pb-1">👑 主辦人隱密主控台</h3>
            <div class="text-xs space-y-1 text-gray-300">
                <p>📊 目前連線/報到人數：<span id="admin-count-join" class="text-white font-bold">0</span> / 16</p>
                <p>📝 目前已完成投票數：<span id="admin-count-vote" class="text-white font-bold">0</span> / 16</p>
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button id="btn-admin-calc" class="bg-emerald-600 hover:bg-emerald-700 font-bold py-2 px-3 rounded text-sm transition">
                    🚀 計算並公佈結果
                </button>
                <button id="btn-admin-reset" class="bg-rose-600 hover:bg-rose-700 font-bold py-2 px-3 rounded text-sm transition">
                    🔄 全域重設 (Reset)
                </button>
            </div>
        </section>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase 專案設定金鑰
        const firebaseConfig = {
          apiKey: "AIzaSyAicnJwTpTewbmyxQBcCb-Cu-0Hcupry88",
          authDomain: "my-couple-game-8cfcd.firebaseapp.com",
          databaseURL: "https://my-couple-game-8cfcd-default-rtdb.firebaseio.com",
          projectId: "my-couple-game-8cfcd",
          storageBucket: "my-couple-game-8cfcd.firebasestorage.app",
          messagingSenderId: "1088332175776",
          appId: "1:1088332175776:web:3c5a982950235cb5fa6cc5",
          measurementId: "G-YSBQ354LZ2"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 系統資料定義
        const ANIMALS = ['兔子', '獅子', '貓咪', '小狗', '企鵝', '大象', '狐狸', '熊熊'];
        const ROLES = [];
        ANIMALS.forEach(a => {
            ROLES.push({ id: `${a}男`, name: `🐰 ${a}男`, gender: 'M', animal: a });
            ROLES.push({ id: `${a}女`, name: `🦊 ${a}女`, gender: 'F', animal: a });
        });

        // 本地狀態
        let myId = null;
        let myRoleObj = null;
        let clickTitleCount = 0;

        // DOM 元素
        const stepIdentity = document.getElementById('step-identity');
        const stepVote = document.getElementById('step-vote');
        const stepWaiting = document.getElementById('step-waiting');
        const stepResult = document.getElementById('step-result');
        const adminPanel = document.getElementById('admin-panel');

        // 密技：點擊標題 5 次切換管理員面板
        document.getElementById('app-title').addEventListener('click', () => {
            clickTitleCount++;
            if (clickTitleCount >= 5) {
                adminPanel.classList.toggle('hidden');
                clickTitleCount = 0;
            }
        });

        // 監聽 Firebase 資料庫狀態
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            const onlineUsers = data.users || {};
            const votes = data.votes || {};
            const systemState = data.state || 'voting';
            const finalMatches = data.matches || {};

            // 更新主辦人控制面板看板
            const joinedCount = Object.keys(onlineUsers).length;
            const votedCount = Object.keys(votes).length;
            document.getElementById('admin-count-join').innerText = joinedCount;
            document.getElementById('admin-count-vote').innerText = votedCount;

            // 處理「重設(Reset)」與動態狀態更新
            if (systemState === 'voting' && !myId) {
                switchStep(stepIdentity);
                renderIdentityGrid(onlineUsers);
            } else if (systemState === 'voting' && myId) {
                renderIdentityGrid(onlineUsers);
                if (!votes[myId] && stepVote.classList.contains('hidden')) {
                    setupVoteScreen();
                }
            }

            // 處理「公佈結果」邏輯
            if (systemState === 'finished') {
                if (myId) {
                    showMyResult(finalMatches[myId] || []);
                } else {
                    document.getElementById('result-title').innerText = "開獎計算完成";
                    document.getElementById('result-status-icon').innerText = "🏁";
                    document.getElementById('result-desc').innerText = "結果已完成交叉配對，並精準派發到各成員手機上。";
                    switchStep(stepResult);
                }
            }
        });

        // 渲染步驟一：身分選單
        function renderIdentityGrid(onlineUsers) {
            const grid = document.getElementById('identity-grid');
            grid.innerHTML = '';
            ROLES.forEach(role => {
                const isTaken = !!onlineUsers[role.id];
                const btn = document.createElement('button');
                btn.className = `p-3 rounded-xl font-bold text-sm transition text-center border ${
                    isTaken 
                    ? 'bg-gray-200 text-gray-400 border-gray-200 cursor-not-allowed' 
                    : 'bg-white hover:bg-indigo-50 text-gray-700 border-gray-300 shadow-sm active:scale-95'
                }`;
                btn.innerText = role.name;
                btn.disabled = isTaken;
                if (!isTaken) {
                    btn.addEventListener('click', () => selectIdentity(role));
                }
                grid.appendChild(btn);
            });
        }

        function selectIdentity(role) {
            myId = role.id;
            myRoleObj = role;
            set(ref(db, `users/${myId}`), true).then(() => {
                setupVoteScreen();
            }).catch(() => {
                alert('該角色剛好被選走了，請選擇其他動物！');
                myId = null;
                myRoleObj = null;
            });
        }

        // 渲染步驟二：投票選單 (排除相同動物且改為 O, △, X 單選鈕)
        function setupVoteScreen() {
            document.getElementById('user-badge').innerText = `目前身分：${myRoleObj.name}`;
            const voteList = document.getElementById('vote-list');
            voteList.innerHTML = '';

            // 規則 1：過濾掉同性別，且「不可出現同種動物的異性成員」
            const opponents = ROLES.filter(r => r.gender !== myRoleObj.gender && r.animal !== myRoleObj.animal);
            
            opponents.forEach(opp => {
                const item = document.createElement('div');
                item.className = "p-3 bg-gray-50 rounded-xl border border-gray-200 space-y-2 shadow-sm";
                item.innerHTML = `
                    <div class="font-bold text-gray-700 text-sm pl-1">🎯 對象：${opp.name}</div>
                    <div class="grid grid-cols-3 gap-1.5">
                        <label class="flex flex-col items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-rose-50 transition select-none">
                            <input type="radio" name="vote_${opp.id}" value="O" class="mb-1 w-4 h-4 text-rose-500 focus:ring-rose-400">
                            <span class="text-xs font-bold text-gray-600">⭕ O</span>
                        </label>
                        <label class="flex flex-col items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-amber-50 transition select-none">
                            <input type="radio" name="vote_${opp.id}" value="△" class="mb-1 w-4 h-4 text-amber-500 focus:ring-amber-400">
                            <span class="text-xs font-bold text-gray-600">⚠️ △</span>
                        </label>
                        <label class="flex flex-col items-center justify-center p-2 bg-white border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-100 transition select-none border-indigo-200 bg-indigo-50/20">
                            <input type="radio" name="vote_${opp.id}" value="X" checked class="mb-1 w-4 h-4 text-gray-500 focus:ring-gray-400">
                            <span class="text-xs font-bold text-gray-600">❌ X</span>
                        </label>
                    </div>
                `;
                voteList.appendChild(item);
            });
            switchStep(stepVote);
        }

        // 送出投票
        document.getElementById('btn-submit-vote').addEventListener('click', () => {
            const opponents = ROLES.filter(r => r.gender !== myRoleObj.gender && r.animal !== myRoleObj.animal);
            const myVotes = {};
            
            opponents.forEach(opp => {
                const selectedOpt = document.querySelector(`input[name="vote_${opp.id}"]:checked`);
                myVotes[opp.id] = selectedOpt ? selectedOpt.value : "X";
            });
            
            set(ref(db, `votes/${myId}`), myVotes).then(() => {
                switchStep(stepWaiting);
            });
        });

        // 顯示個人結果畫面
        function showMyResult(myMatches) {
            const title = document.getElementById('result-title');
            const icon = document.getElementById('result-status-icon');
            const desc = document.getElementById('result-desc');
            const matchContainer = document.getElementById('match-container');
            const matchList = document.getElementById('match-list');

            matchList.innerHTML = '';

            if (myMatches && myMatches.length > 0) {
                icon.innerText = "✨";
                title.innerText = "開獎結果揭曉";
                title.className = "text-2xl font-black text-indigo-600";
                matchContainer.classList.remove('hidden');
                
                myMatches.forEach(match => {
                    const card = document.createElement('div');
                    const isHeaven = match.style === 'heaven';
                    
                    card.className = `w-full p-4 rounded-xl border text-left space-y-1 shadow-sm ${
                        isHeaven ? 'bg-amber-50 border-amber-300' : 'bg-emerald-50 border-emerald-300'
                    }`;
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-base ${isHeaven ? 'text-amber-800' : 'text-emerald-800'}">🤝 匹配成功：${match.oppCouple}</span>
                            <span class="text-xs px-2 py-0.5 rounded-full font-bold ${
                                isHeaven ? 'bg-amber-200 text-amber-900' : 'bg-emerald-200 text-emerald-900'
                            }">${isHeaven ? '❤️ 完美契合' : '✨ 緣分連線'}</span>
                        </div>
                        <div class="text-lg font-black mt-1 ${isHeaven ? 'text-amber-600 animate-pulse' : 'text-emerald-600'}">
                            ${match.text}
                        </div>
                    `;
                    matchList.appendChild(card);
                });
                desc.innerText = "太棒了！上面是與你們小組互相達成好感共識的對象，快去相認吧！";
            } else {
                icon.innerText = "🍃";
                title.innerText = "期待下次的火花";
                title.className = "text-2xl font-black text-gray-600";
                matchContainer.classList.add('hidden');
                desc.innerText = "本次活動小組未有重疊的互選成功對象。\n別灰心，多聊天相處，期待未來的火花！\n（所有隱私選單內容已全部保密銷毀）";
            }
            switchStep(stepResult);
        }

        // 👑 主辦人交叉計算配對邏輯
        document.getElementById('btn-admin-calc').addEventListener('click', () => {
            if (!confirm('確定要結束投票並精準派發個人結果嗎？')) return;

            onValue(ref(db, 'votes'), (snapshot) => {
                const votes = snapshot.val() || {};
                const matches = {};

                // 初始化每個人的配對容器
                ROLES.forEach(r => matches[r.id] = []);

                // 規則 2：兩對情侶小組（4個人）之間必須完全雙向互投交叉比對
                for (let i = 0; i < ANIMALS.length; i++) {
                    for (let j = i + 1; j < ANIMALS.length; j++) {
                        const aniA = ANIMALS[i];
                        const aniB = ANIMALS[j];

                        // 4 個關鍵成員 ID
                        const Am = `${aniA}男`;
                        const Af = `${aniA}女`;
                        const Bm = `${aniB}男`;
                        const Bf = `${aniB}女`;

                        // 撈取四方意向投遞值 (若沒投，防呆預設為 X)
                        const v_Am_Bf = (votes[Am] && votes[Am][Bf]) ? votes[Am][Bf] : 'X';
                        const v_Af_Bm = (votes[Af] && votes[Af][Bm]) ? votes[Af][Bm] : 'X';
                        const v_Bm_Af = (votes[Bm] && votes[Bm][Af]) ? votes[Bm][Af] : 'X';
                        const v_Bf_Am = (votes[Bf] && votes[Bf][Am]) ? votes[Bf][Am] : 'X';

                        const scores = [v_Am_Bf, v_Af_Bm, v_Bm_Af, v_Bf_Am];

                        // 規則 7：二對只要一個人投X，就配對失敗
                        if (scores.includes('X')) {
                            continue;
                        }

                        let resultMessage = "";
                        let styleType = "";

                        if (scores.every(s => s === 'O')) {
                            // 規則 8：二對共4張票都是 O -> 恭喜! 天選之人
                            resultMessage = "恭喜! 天選之人";
                            styleType = "heaven";
                        } else if (scores.includes('△')) {
                            // 規則 9：無 X 且只要有一個 △ -> 下次再約出來玩啊
                            resultMessage = "下次再約出來玩啊";
                            styleType = "nice";
                        }

                        // 如果符合條件，將結果寫入這 4 個人個別的結果通道中
                        if (resultMessage) {
                            const infoForA = { oppCouple: `${aniB}組`, text: resultMessage, style: styleType };
                            const infoForB = { oppCouple: `${aniA}組`, text: resultMessage, style: styleType };

                            matches[Am].push(infoForA);
                            matches[Af].push(infoForA);
                            matches[Bm].push(infoForB);
                            matches[Bf].push(infoForB);
                        }
                    }
                }

                update(ref(db), {
                    matches: matches,
                    state: 'finished'
                });
            }, { onlyOnce: true });
        });

        // 主辦人一鍵全域重設 (Reset)
        document.getElementById('btn-admin-reset').addEventListener('click', () => {
            if (!confirm('🔥 警告！這將清除所有人的投票、配對紀錄與報到狀態，確定重設？')) return;
            
            myId = null;
            myRoleObj = null;

            set(ref(db, '/'), {
                state: 'voting',
                users: {},
                votes: {},
                matches: {}
            }).then(() => {
                alert('系統已完全重設！所有人手機將返回起點。');
            });
        });

        function switchStep(targetStep) {
            [stepIdentity, stepVote, stepWaiting, stepResult].forEach(s => s.classList.add('hidden'));
            targetStep.classList.remove('hidden');
        }
    </script>
</body>
</html>
